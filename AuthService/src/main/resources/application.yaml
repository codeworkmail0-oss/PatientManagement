spring:
  application:
    name: AuthService

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: grim123
    password: grim123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    table: flyway_schema_history_patient

server:
  port: 4005

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
  instance:
    prefer-ip-address: true

jwt:
  secret: mySuperSecretJwtKeyThatIsAtLeast32CharactersLong123
  expiration: 86400000
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans